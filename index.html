<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>micro:bit Joystick</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; margin: 0; overflow: hidden; }
        #header { padding: 20px; background: #333; color: white; }
        #zone_joystick {
            position: relative;
            width: 100%;
            height: 400px;
            background: #ddd;
            touch-action: none;
        }
        .btn { padding: 15px 30px; font-size: 18px; margin: 20px; cursor: pointer; border-radius: 8px; border: none; background: #28a745; color: white; }
        #status { font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div id="header">
    <h1>micro:bit RC</h1>
    <button id="connect" class="btn">micro:bitに接続</button>
    <p id="status">切断中</p>
</div>

<div id="zone_joystick"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

<script>
    // 1. 変数名を uartCharacteristic で統一します
    let uartCharacteristic = null;

    // --- Bluetooth接続処理 ---
    document.getElementById('connect').addEventListener('click', async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'BBC micro:bit' }],
                optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
            // ここで uartCharacteristic に代入
            uartCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');

            document.getElementById('status').innerText = "接続済み！";
            document.getElementById('status').style.color = "green";
        } catch (error) {
            console.error(error);
            alert("接続に失敗しました: " + error);
        }
    });

    // --- ジョイスティックの設定 ---
    const options = {
        zone: document.getElementById('zone_joystick'),
        mode: 'static',
        position: { left: '50%', top: '50%' },
        color: 'blue',
        size: 150
    };
    const joystick = nipplejs.create(options);

    // --- データ送信関数 ---
    // ここで使う変数名を uartCharacteristic に完全に一致させました
    function sendCommand(data) {
        if (uartCharacteristic) {
            const encoder = new TextEncoder();
            // writeValue を writeValueWithoutResponse に変更します
            uartCharacteristic.writeValueWithoutResponse(encoder.encode(data))
                .then(() => console.log("送信成功: " + data))
                .catch(error => {
                    // もし WithoutResponse が使えないブラウザの場合は従来の方式を試す
                    console.warn("WithoutResponse失敗、通常書き込みを試行...");
                    uartCharacteristic.writeValue(encoder.encode(data));
                });
        }
    }

    // --- ジョイスティックのイベント ---
    joystick.on('move', (evt, data) => {
        if (data.direction) {
            const dir = data.direction.angle; 
            if (dir === 'up') sendCommand('F'); 
            if (dir === 'down') sendCommand('B');
            if (dir === 'left') sendCommand('L');
            if (dir === 'right') sendCommand('R');
        }
    });

    joystick.on('end', () => {
        sendCommand('S'); 
    });

</script>
</body>
</html>
