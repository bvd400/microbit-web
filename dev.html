<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>micro:bit RC - Stable Version</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f0f0f0; margin: 0; overflow: hidden; }
        #version { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; z-index: 1000; }
        #refresh { position: fixed; top: 10px; right: 10px; background: rgba(0,123,255,0.8); color: white; padding: 8px 12px; border: none; border-radius: 4px; font-size: 12px; cursor: pointer; z-index: 1000; transition: background 0.2s; }
        #refresh:hover { background: rgba(0,123,255,1); }
        #header { padding: 20px; background: #333; color: white; }
        #zone_joystick {
            position: relative;
            width: 100%;
            height: 400px;
            background: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            touch-action: none;
        }
        .dpad-container {
            position: relative;
            width: 200px;
            height: 200px;
        }
        .dpad-btn {
            position: absolute;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dpad-btn:active, .dpad-btn.active {
            background: #0056b3;
            transform: scale(0.95);
        }
        .dpad-up {
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
        }
        .dpad-down {
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
        }
        .dpad-left {
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
        }
        .dpad-right {
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
        }
        .dpad-center {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: #6c757d;
        }
        .btn { padding: 15px 30px; font-size: 18px; margin: 20px; cursor: pointer; border-radius: 8px; border: none; background: #28a745; color: white; }
        .btn:active { background: #1e7e34; }
        #status { font-weight: bold; color: #ccc; }
        #text-control { padding: 20px; background: #f8f9fa; border-top: 1px solid #ddd; }
        #text-input { padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; width: 200px; margin-right: 10px; }
        #send-text { padding: 10px 20px; font-size: 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #send-text:active { background: #0056b3; }
    </style>
</head>
<body>

<div id="version">v04301834</div>
<button id="refresh" onclick="location.reload()">↻ 更新</button>

<div id="header">
    <h1>micro:bit RC</h1>
    <button id="connect" class="btn">micro:bitに接続</button>
    <p id="status">ステータス: 未接続</p>
</div>

<div id="zone_joystick">
    <div class="dpad-container">
        <button class="dpad-btn dpad-up" data-direction="F">↑</button>
        <button class="dpad-btn dpad-down" data-direction="B">↓</button>
        <button class="dpad-btn dpad-left" data-direction="L">←</button>
        <button class="dpad-btn dpad-right" data-direction="R">→</button>
        <button class="dpad-btn dpad-center" data-direction="S">●</button>
    </div>
</div>

<div id="text-control">
    <input type="text" id="text-input" placeholder="文字列を入力" value="">
    <button id="send-text">送信</button>
</div>

<script>
const UUID_UART_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e'
const UUID_TX_CHAR_CHARACTERISTIC = '6e400002-b5a3-f393-e0a9-e50e24dcca9e'
const UUID_RX_CHAR_CHARACTERISTIC = '6e400003-b5a3-f393-e0a9-e50e24dcca9e'

let gatt = null
let tx = null
let rx = null

// --- Bluetooth接続処理 ---
const update = connected => {
    const connectBtn = document.getElementById('connect')
    const statusEl = document.getElementById('status')
    
    if (connected) {
        connectBtn.textContent = '切断'
        connectBtn.style.background = '#dc3545'
        statusEl.innerText = "ステータス: 接続済み！";
        statusEl.style.color = "#00ff00";
    } else {
        connectBtn.textContent = 'micro:bitに接続'
        connectBtn.style.background = '#28a745'
        statusEl.innerText = "ステータス: 未接続";
        statusEl.style.color = "#ccc";
    }
}

const send = text => {
    if (!rx) return;
    try {
        rx.writeValue(new TextEncoder().encode(text + '\n'))
        console.log("送信成功:", text);
    } catch (error) {
        console.error("送信エラー:", error);
    }
}

document.getElementById('connect').addEventListener('click', e => {
    if(!(navigator.bluetooth && navigator.bluetooth.requestDevice)) {
        alert('WebBluetooth に未対応のブラウザです。')
        return
    }
    
    const connectBtn = document.getElementById('connect')
    const statusEl = document.getElementById('status')
    
    if (connectBtn.textContent === 'micro:bitに接続') {
        statusEl.innerText = "接続中...";
        
        navigator.bluetooth.requestDevice({
            filters: [
                { services: [UUID_UART_SERVICE] },
                { namePrefix: 'BBC micro:bit' }
            ]
        }).then(device => {
            gatt = device.gatt
            return gatt.connect()
        }).then(server =>
            server.getPrimaryService(UUID_UART_SERVICE)
        ).then(service =>
            Promise.all([
                service.getCharacteristic(UUID_TX_CHAR_CHARACTERISTIC),
                service.getCharacteristic(UUID_RX_CHAR_CHARACTERISTIC)])
        ).then(characteristics => {
            tx = characteristics[0]
            tx.startNotifications()
            tx.addEventListener('characteristicvaluechanged', e => {
                const text = new TextDecoder().decode(e.target.value)
                console.log("受信データ:", text);
                // 必要であれば受信データをUIに表示
            })
            rx = characteristics[1]
            update(true)
            console.log("Connected to micro:bit")
        }).catch(function(err) {
            console.error(err)
            statusEl.innerText = "ステータス: 接続失敗";
            statusEl.style.color = "red";
            alert("接続エラー: " + err)
        })
    } else {
        if (gatt) {
            gatt.disconnect()
        }
        update(false)
    }
})

// --- 十字キーの設定 ---
let lastDir = "";
let activeButtons = new Set();

// 十字キーのイベント処理
function handleDirectionPress(direction, isPressed) {
    if (isPressed) {
        activeButtons.add(direction);
    } else {
        activeButtons.delete(direction);
    }
    
    let currentCmd = "S"; // デフォルトは停止
    
    if (activeButtons.size > 0) {
        // 優先順位: 上 > 下 > 左 > 右
        if (activeButtons.has('F')) currentCmd = 'F';
        else if (activeButtons.has('B')) currentCmd = 'B';
        else if (activeButtons.has('L')) currentCmd = 'L';
        else if (activeButtons.has('R')) currentCmd = 'R';
    }
    
    if (currentCmd !== lastDir) {
        send(currentCmd);
        lastDir = currentCmd;
        console.log("コマンド送信:", currentCmd);
    }
}

// マウスイベント
document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        const direction = btn.dataset.direction;
        btn.classList.add('active');
        handleDirectionPress(direction, true);
    });
    
    btn.addEventListener('mouseup', (e) => {
        e.preventDefault();
        const direction = btn.dataset.direction;
        btn.classList.remove('active');
        handleDirectionPress(direction, false);
    });
    
    btn.addEventListener('mouseleave', (e) => {
        const direction = btn.dataset.direction;
        btn.classList.remove('active');
        handleDirectionPress(direction, false);
    });
});

// タッチイベント
document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const direction = btn.dataset.direction;
        btn.classList.add('active');
        handleDirectionPress(direction, true);
    });
    
    btn.addEventListener('touchend', (e) => {
        e.preventDefault();
        const direction = btn.dataset.direction;
        btn.classList.remove('active');
        handleDirectionPress(direction, false);
    });
    
    btn.addEventListener('touchcancel', (e) => {
        e.preventDefault();
        const direction = btn.dataset.direction;
        btn.classList.remove('active');
        handleDirectionPress(direction, false);
    });
});

// キーボードイベント
document.addEventListener('keydown', (e) => {
    let direction = null;
    switch(e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
            direction = 'F';
            break;
        case 'ArrowDown':
        case 's':
        case 'S':
            direction = 'B';
            break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
            direction = 'L';
            break;
        case 'ArrowRight':
        case 'd':
        case 'D':
            direction = 'R';
            break;
        case ' ':
            direction = 'S';
            break;
    }
    
    if (direction) {
        e.preventDefault();
        const btn = document.querySelector(`[data-direction="${direction}"]`);
        if (btn) btn.classList.add('active');
        handleDirectionPress(direction, true);
    }
});

document.addEventListener('keyup', (e) => {
    let direction = null;
    switch(e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
            direction = 'F';
            break;
        case 'ArrowDown':
        case 's':
        case 'S':
            direction = 'B';
            break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
            direction = 'L';
            break;
        case 'ArrowRight':
        case 'd':
        case 'D':
            direction = 'R';
            break;
        case ' ':
            direction = 'S';
            break;
    }
    
    if (direction) {
        e.preventDefault();
        const btn = document.querySelector(`[data-direction="${direction}"]`);
        if (btn) btn.classList.remove('active');
        handleDirectionPress(direction, false);
    }
});

// --- 文字列送信機能 ---
document.getElementById('send-text').addEventListener('click', () => {
    const textInput = document.getElementById('text-input');
    const text = textInput.value.trim();
    
    if (text) {
        send(text);
        console.log("文字列送信:", text);
    } else {
        console.log("文字列が空です");
    }
});

// Enterキーで送信
document.getElementById('text-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        document.getElementById('send-text').click();
    }
});

</script>
</body>
</html>
